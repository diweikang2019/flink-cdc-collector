# log4j 1.x\uFF08\u7ECF slf4j-log4j12 \u7ED1\u5B9A\uFF09
# \u7B56\u7565\uFF1A\u6839\u7EA7\u522B WARN \u964D\u566A\uFF1B\u672C\u4E1A\u52A1\u5305\u5355\u72EC INFO\uFF1BCDC \u76F8\u5173\u53EF\u6309\u9700\u8C03\u6574

# \u6839\uFF1A\u63A7\u5236\u53F0 + \u6309\u5927\u5C0F\u6EDA\u52A8\u6587\u4EF6\uFF08\u5DE5\u4F5C\u76EE\u5F55\u4E0B log/cdc-collector.log\uFF1B\u4ED3\u5E93\u5DF2\u542B log \u76EE\u5F55\uFF09
log4j.rootLogger=WARN, console, rolling

# ---------- Console ----------
log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.target=System.out
log4j.appender.console.encoding=UTF-8
log4j.appender.console.layout=org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%t] %c{1} - %m%n

# ---------- Rolling file\uFF08\u5355\u6587\u4EF6\u7EA6 50MB\uFF0C\u4FDD\u7559 10 \u4E2A\u5907\u4EFD\uFF09----------
log4j.appender.rolling=org.apache.log4j.RollingFileAppender
log4j.appender.rolling.File=log/cdc-collector.log
log4j.appender.rolling.Append=true
log4j.appender.rolling.encoding=UTF-8
log4j.appender.rolling.MaxFileSize=50MB
log4j.appender.rolling.MaxBackupIndex=10
log4j.appender.rolling.layout=org.apache.log4j.PatternLayout
log4j.appender.rolling.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%t] %c - %m%n

# ---------- \u672C\u5DE5\u7A0B\u4E1A\u52A1\u4EE3\u7801 ----------
log4j.logger.com.zhonghe.flink.cdc.collector=INFO

# ---------- Flink / Kafka\uFF1A\u964D\u566A ----------
log4j.logger.org.apache.flink=WARN
log4j.logger.org.apache.kafka=WARN
log4j.logger.org.apache.kafka.clients=WARN

# ---------- Flink CDC / Debezium\uFF1A\u6392\u969C\u65F6\u5E38\u7528 INFO\uFF0C\u7EBF\u4E0A\u53EF\u6539\u4E3A WARN ----------
log4j.logger.com.ververica.cdc=INFO
log4j.logger.io.debezium=INFO
log4j.logger.com.github.shyiko.mysql.binlog=WARN

# ---------- \u5176\u5B83\u6613\u5237\u5C4F\u7EC4\u4EF6 ----------
log4j.logger.org.apache.zookeeper=WARN
log4j.logger.org.apache.curator=WARN
